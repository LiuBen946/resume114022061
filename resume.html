<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>個人履歷</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Segoe UI", sans-serif;
      background-color: #f2f2f2;
    }

    .container {
      width: 1000px;
      margin: 40px auto;
      background: #fff;
      display: flex;
      min-height: 1200px;
    }

    /* 左欄 */
    .sidebar {
      width: 35%;
      background-color: #2f3b57;
      color: #fff;
      padding: 40px 30px;
    }

    .avatar {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 20px;
      border: 4px solid #fff;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .name {
      text-align: center;
      font-size: 32px;
      margin-top: 10px;
    }

    .title {
      text-align: center;
      margin-top: 8px;
      letter-spacing: 4px;
      opacity: 0.9;
    }

    .sidebar-section {
      margin-top: 40px;
    }

    .sidebar-section h3 {
      font-size: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.4);
      padding-bottom: 10px;
      margin-bottom: 15px;
    }

    .sidebar-section p,
    .sidebar-section li {
      font-size: 14px;
      line-height: 1.8;
      opacity: 0.95;
    }

    .sidebar-section ul {
      padding-left: 18px;
      margin: 0;
    }

    /* 右欄 */
    .content {
      width: 65%;
      padding: 50px 60px;
    }

    .block {
      margin-bottom: 40px;
    }

    .block h2 {
      font-size: 20px;
      background-color: #2f3b57;
      color: #fff;
      display: inline-block;
      padding: 6px 18px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .item {
      margin-bottom: 18px;
    }

    .item span {
      display: inline-block;
      width: 90px;
      color: #555;
      font-size: 14px;
    }

    .item p {
      display: inline-block;
      margin: 0;
      font-size: 15px;
    }

    .hobby {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .hobby div {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #2f3b57;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 左側 -->
    <div class="sidebar">
      <div class="avatar">
        <img src="images/tsay.jpg" alt="個人照片">
      </div>

      <div class="name">劉宥承</div>
      <div class="title">學生</div>

      <div class="sidebar-section">
        <h3>基本資料</h3>
        <p>亞洲大學 在學</p>
        <p>學號：114022061</p>
      </div>

      <div class="sidebar-section">
        <h3>技能</h3>
        <ul>
          <li>HTML / CSS / JavaScript</li>
          <li>Word / Excel / PowerPoint</li>
          <li>基本程式邏輯</li>
        </ul>
      </div>

      <div class="sidebar-section">
        <h3>自我評價</h3>
        <p>
          做事認真負責，具備良好學習能力，
          能獨立作業也能配合團隊完成任務。
        </p>
      </div>
    </div>

    <!-- 右側 -->
    <div class="content">
      <div class="block">
        <h2>學歷</h2>
        <div class="item">
          <span>2023 - 現在</span>
          <p>亞洲大學 大學部（在學中）</p>
        </div>
      </div>

      <div class="block">
        <h2>專題 / 作品</h2>
        <div class="item">
          <span>課程專題</span>
          <p>單一檔案個人履歷網站</p>
        </div>
        <div class="item">
          <span>團隊合作</span>
          <p>課堂簡報與報告製作</p>
        </div>
      </div>

      <div class="block">
        <h2>興趣愛好</h2>
        <div class="hobby">
          <div>桌球</div>
          <div>健身</div>
          <div>美食</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
