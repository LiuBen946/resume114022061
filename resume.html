<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>個人履歷 - 劉宥承</title>
  <style>
    body {
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      background-color: #f4f6f8;
      margin: 0;
      padding: 40px;
    }
    .resume {
      max-width: 900px;
      margin: auto;
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 36px;
    }
    h2 {
      margin-top: 32px;
      padding-bottom: 6px;
      border-bottom: 2px solid #e0e0e0;
    }
    .info {
      color: #555;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    ul {
      padding-left: 20px;
    }
    li {
      margin-bottom: 8px;
    }
    button {
      margin-top: 20px;
      padding: 10px 18px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      background-color: #2563eb;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    .footer {
      margin-top: 40px;
      font-size: 14px;
      color: #888;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="resume">
    <h1>劉宥承</h1>
    <div class="info">
      亞洲大學 在學學生<br>
      學號：114022061
    </div>

    <h2>自我簡介</h2>
    <p>
      目前就讀於亞洲大學，對資訊科技與數位應用領域充滿興趣，
      具備良好的學習態度與責任感，能與團隊成員良好合作。
    </p>

    <h2>學歷</h2>
    <ul>
      <li>亞洲大學 — 大學部（在學中）</li>
    </ul>

    <h2>技能</h2>
    <ul>
      <li>HTML / CSS / JavaScript（基礎）</li>
      <li>Word / Excel / PowerPoint</li>
      <li>基本程式邏輯與問題分析能力</li>
    </ul>

    <h2>專題或作品</h2>
    <ul>
      <li>單一檔案個人履歷網站</li>
      <li>課堂小組報告與簡報製作</li>
    </ul>

    <h2>其他</h2>
    <ul>
      <li>時間管理能力佳</li>
      <li>可配合團隊合作與任務分工</li>
    </ul>

    <button onclick="downloadResume()">下載履歷 HTML 檔</button>

    <div class="footer">
      最後更新日期：<span id="date"></span>
    </div>
  </div>

  <script>
    document.getElementById("date").textContent =
      new Date().toLocaleDateString("zh-TW");

    function downloadResume() {
      const html = document.documentElement.outerHTML;
      const blob = new Blob([html], { type: "text/html;charset=utf-8;" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "resume.html";
      link.click();
    }
  </script>
</body>
</html>
